<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Catálogo de Tênis</title>
 
<style>
 
    body {
 
        font-family: Arial, Helvetica, sans-serif;
 
        background: #f5f5f5;
 
        margin: 0;
 
    }
 
    header {
 
        background: #111;
 
        color: white;
 
        text-align: center;
 
        padding: 20px;
 
    }
 
    h1 {
 
        margin: 0;
 
    }
 
    .catalogo {
 
        display: flex;
 
        justify-content: center;
 
        flex-wrap: wrap;
 
        padding: 20px;
 
        gap: 20px;
 
    }
 
    .card {
 
        background: white;
 
        width: 200px;
 
        border-radius: 10px;
 
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
 
        text-align: center;
 
        padding: 15px;
 
        transition: 0.3s;
 
    }
 
    .card:hover {
 
        transform: scale(1.05);
 
    }
 
    .card img {
 
        width: 100%;
 
        border-radius: 10px;
 
    }
 
    .nome {
 
        font-weight: bold;
 
        margin: 10px 0;
 
    }
 
    .preco {
 
        color: green;
 
        font-size: 18px;
 
        margin-bottom: 10px;
 
    }
 
    button {
 
        background: #111;
 
        color: white;
 
        border: none;
 
        padding: 10px;
 
        border-radius: 5px;
 
        cursor: pointer;
 
    }
 
    button:hover {
 
        background: #444;
 
    }
</style>
</head>
<body>
<header>
<h1>Catálogo de Tênis</h1>
</header>
<section class="catalogo">
<div class="card">
<img src="WIN_20260415_15_16_10_Pro.jpg" alt="Tênis 1">
<div class="nome">Havaianas Branco (seminovo)</div>
<div class="preco">R$ 39,90</div>
<button>Comprar</button>
</div>
<div class="card">
<img src="WIN_20260415_15_16_25_Pro.jpg" alt="Tênis 2">
<div class="nome">Chinelo Preto Havaianas (seminovo)</div>
<div class="preco">R$ 49,90</div>
<button>Comprar</button>  
</div>
<div class="card">
<img src="WIN_20260415_15_16_33_Pro.jpg" alt="Tênis 3">
<div class="nome">Mizuno usado PELO PRESIDA</div>
<div class="preco">R$ 999,00</div>
<button>Comprar</button>
</div>
</section>
</body>
</html>
